

services:
  nginx:
    image: nginx:1.27-alpine
    restart: always
    deploy:
     resources:
       limits:
         cpus: '1.0'
         memory: 512M
       reservations:
         cpus: '0.25'
         memory: 128M
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
    healthcheck:
      test: curl --fail http://localhost || exit 1
      interval: 60s
      retries: 5
      start_period: 20s
      timeout: 10s
    networks:
      - "app-net"
    hostname: app_nginx
    container_name: app_nginx
    volumes:
      - ./nginx/appng.conf/:/etc/nginx/conf.d/appng.conf


  cr-app:
    restart: always
    image: "pywebd:v1"
    networks:
      - "app-net"
    hostname: pywebd
    container_name: pywebd

networks:
  "app-net":
    driver: bridge
