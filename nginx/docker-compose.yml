version: '3.4'

services:
  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
    healthcheck:
      test: curl --fail http://localhost || exit 1
      interval: 60s
      retries: 5
      start_period: 20s
      timeout: 10s
    networks:
      - "app-net"
    hostname: app_nginx
    container_name: app_nginx
    volumes:
      - ./appng.conf/:/etc/nginx/conf.d/appng.conf


  cr-app:
    restart: always
    image: "pywebd:v1"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 20s
    networks:
      - "app-net"
    hostname: pywebd
    container_name: pywebd

networks:
  "app-net":
    driver: bridge
